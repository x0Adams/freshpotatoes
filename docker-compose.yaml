services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: freshpotato-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - appnet

  recommendation:
    image: notkulonme/freshrecommendation:latest
    container_name: freshpotato-recommendation
    restart: unless-stopped
    environment:
      PY_DB_URL: mysql+pymysql://root@localhost:3306/fresh_potatoes
      DB_PASS: toor
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RETRAIN_MAX_DELAY_SEC: 3600
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - appnet

  backend:
    image: notkulonme/freshpotato-dev:release
    container_name: freshpotato-backend
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      DB_URL: jdbc:mariadb://localhost:3306/fresh_potatoes
      DB_USER: root
      DB_PASS: toor
      RECOMMENDATION_API_URL: http://recommendation:8090
      SHOW_SQL: "false"
      ACCESS_TOKEN_TTL: 10m
      REFRESH_TOKEN_TTL: 10d
      CONTACT_EMAIL: #your email, if the wikifoundation wants to contact you, NECESEARY
      WIKI_USER_AGENT: freshPotatoBot
      GOOGLE_API_KEY: #needed to fetch youtube trailers, delete if not needed
    ports:
      - "8080:8080"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
